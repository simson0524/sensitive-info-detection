# configs/init_project_config.yaml

# ============================================================
# [Init Project Config] 프로젝트 초기화 및 사전 구축 설정
# ============================================================

### [필독] ###
# 설정값 수정 전 주의사항 🚨
# 1. 실험 진행에 따라 임의 수정 가능한 설정값은 ✅, 수정 불가능한 설정값은 ❌로 주석처리 되어 있습니다.
# 2. 수정 불가능한 설정값(❌)을 수정할 경우 로그 저장경로 변동 등으로 인해 실험결과/진행이 어려울 수 있습니다.           
# 3. 임의 수정 가능한 설정값(✅)의 경우 입력 가능한 경우가 정해져 있는 경우가 있으니 해당 항목의 주석을 참고하시기 바랍니다. 
# ----------------------------------------------------------------------------------------------

project:
  init_code: "INIT_PROJECT"  # ✅ 로그 저장용 식별 코드
  log_dir: "outputs/logs"    # ❌ 로그 저장 경로

# 정답지 기반 사전 구축 설정이므로, 반드시 존재하는 도메인 ID와 정답지 경로를 삽입할 것.
# 사전 구축에서 오류가 나더라도 데이터베이스 설정은 정상적으로 마무리 됨
dictionary_init:
  # 1. 구축할 도메인 ID (DB info_dictionary의 domain_id로 들어감).
  target_domain_id: "2" # ✅
  
  # 2. 정답지 CSV 파일 경로 (여기서 단어와 라벨을 추출)
  # CSV 컬럼 필수 포함: 'word', 'label'
  source_csv_path: "/home/student1/sensitive-info-detection/data/train_data/002_patient_chart/answer_sheet.csv" # ✅